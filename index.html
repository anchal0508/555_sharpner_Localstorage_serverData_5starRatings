<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
</head>

<body>

    <div class="container">
        <h1 class="mainHeading">Feedback System</h1>
        <div class="subContainer">
            <div class="dashboardBox">
                <div id="1">*</div>
                <div id="2">**</div>
                <div id="3">***</div>
                <div id="4">****</div>
                <div id="5">*****</div>
            </div>
            <div class="ratingBox">
                  <form onsubmit="handleFormSubmit(event)">
                    <label for="username">Enter Your Name</label>
                    <input type="text" name="username" id="username">
                    <label for="rating">Choose Rating</label>
                    <select name="rating" id="rating">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>

                    <button class="submit-button" id="subBtn" name="subBtn">Submit</button>
                </form>
            </div>
            <div class="dataBox">
                <ul id="userList" class="userDetails"></ul>
            </div>
        </div>
    </div>
</body>

<script src="index.js"></script>

</html>
